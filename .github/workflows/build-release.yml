name: Build and Release Patcher

on:
  release:
    types: [published]
  workflow_dispatch: # Permite compilar manualmente desde la pestaña "Actions"

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        
    - name: Construir el ejecutable (.exe)
      run: |
        pyinstaller StrawPatcher.spec

    - name: Preparar archivo ZIP para distribución
      run: |
        mkdir StrawPatcherRelease
        copy dist\StrawPatcher.exe StrawPatcherRelease\
        mkdir StrawPatcherRelease\input
        mkdir StrawPatcherRelease\output
        copy README.md StrawPatcherRelease\
        Compress-Archive -Path StrawPatcherRelease\* -DestinationPath StrawPatcher-Windows.zip

    - name: Subir ZIP a la Release
      uses: softprops/action-gh-release@v1
      with:
        files: StrawPatcher-Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
